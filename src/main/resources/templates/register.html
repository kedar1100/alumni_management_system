<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - AlumniMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="/" class="nav-brand">🎓 AlumniMS</a>
        <div class="nav-links">
            <a href="/login">Login</a>
        </div>
    </nav>

    <!-- Register Form -->
    <div class="form-container">
        <h2>Create Account 🎓</h2>

        <div id="error-msg" class="error-box" style="display:none;"></div>
        <div id="success-msg" class="success-box" style="display:none;"></div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="john@gmail.com" />
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Create a password" />
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm your password" />
        </div>

        <button class="form-submit" onclick="handleRegister()">Create Account</button>

        <div class="form-footer">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>

    <script>
        async function handleRegister() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!email || !password || !confirmPassword) {
                showError('Please fill in all fields!');
                return;
            }

            if (password !== confirmPassword) {
                showError('Passwords do not match!');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters!');
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.text();

                if (response.ok) {
                    showSuccess('Account created! Redirecting to login...');
                    setTimeout(() => window.location.href = '/login', 1500);
                } else {
                    showError(result);
                }
            } catch (error) {
                showError('Something went wrong. Please try again!');
            }
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('success-msg').style.display = 'none';
        }

        function showSuccess(msg) {
            const el = document.getElementById('success-msg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('error-msg').style.display = 'none';
        }
    </script>

</body>
</html>
