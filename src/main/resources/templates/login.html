<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - AlumniMS</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <nav class="navbar">
        <a href="/" class="nav-brand">🎓 AlumniMS</a>
        <div class="nav-links">
            <a href="/register" class="btn-primary">Register</a>
        </div>
    </nav>

    <div class="form-container">
        <h2>Welcome Back! 👋</h2>

        <div id="errorMsg" class="error-box" style="display:none;"></div>
        <div id="successMsg" class="success-box" style="display:none;"></div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="john@gmail.com" />
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password"
                placeholder="Enter your password"
                onkeypress="if(event.key==='Enter') handleLogin()" />
        </div>

        <button class="form-submit" onclick="handleLogin()">Login</button>

        <div class="form-footer">
            Don't have an account? <a href="/register">Register here</a>
        </div>
    </div>

    <script>
        // If already logged in redirect to dashboard
        if (localStorage.getItem('alumniUser')) {
            window.location.href = '/dashboard';
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showError('Please fill in all fields!');
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (response.ok) {
                    // Save user to localStorage
                    localStorage.setItem('alumniUser', JSON.stringify({
                        id: result.id,
                        email: result.email,
                        role: result.role
                    }));
                    showSuccess('Login successful! Redirecting...');
                    setTimeout(() => window.location.href = '/dashboard', 1500);
                } else {
                    showError(result || 'Login failed!');
                }
            } catch(e) {
                showError('Something went wrong. Please try again!');
            }
        }

        function showError(msg) {
            document.getElementById('errorMsg').textContent = msg;
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }

        function showSuccess(msg) {
            document.getElementById('successMsg').textContent = msg;
            document.getElementById('successMsg').style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }
    </script>

</body>
</html>
