<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - AlumniMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="/" class="nav-brand">🎓 AlumniMS</a>
        <div class="nav-links">
            <a href="/register" class="btn-primary">Register</a>
        </div>
    </nav>

    <!-- Login Form -->
    <div class="form-container">
        <h2>Welcome Back! 👋</h2>

        <!-- Error Message -->
        <div id="error-msg" class="error-box" style="display:none;"></div>

        <!-- Success Message -->
        <div id="success-msg" class="success-box" style="display:none;"></div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="john@gmail.com" />
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password" />
        </div>

        <button class="form-submit" onclick="handleLogin()">Login</button>

        <div class="form-footer">
            Don't have an account? <a href="/register">Register here</a>
        </div>
    </div>

    <script>
        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showError('Please fill in all fields!');
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.text();

                if (response.ok) {
                    showSuccess('Login successful! Redirecting...');
                    setTimeout(() => window.location.href = '/dashboard', 1500);
                } else {
                    showError(result);
                }
            } catch (error) {
                showError('Something went wrong. Please try again!');
            }
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('success-msg').style.display = 'none';
        }

        function showSuccess(msg) {
            const el = document.getElementById('success-msg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('error-msg').style.display = 'none';
        }
    </script>

</body>
</html>
